name = "admira-marketplace"
main = "src/index.js"
compatibility_date = "2025-12-01"

[vars]
ALLOWED_ORIGINS = "https://csilvasantin.github.io,https://www.xpaceos.com,https://xpaceos.com,https://admira.store,https://xpl.admira.store,http://localhost:9124,http://127.0.0.1:9124,http://localhost:5173"
# ADMIN_TOKEN es un SECRET de Cloudflare (wrangler secret put ADMIN_TOKEN), no un var en claro.
# Valor guardado en la bóveda de la flota: vault-get.sh ADMIN_TOKEN_MARKETPLACE
DEFAULT_AUCTION_HOURS = "24"
DEFAULT_CAMPAIGN_HOURS = "24"
MIN_BID_INCREMENT = "5"

[[d1_databases]]
binding = "DB"
database_name = "admira-marketplace-db"
database_id = "279f1666-b01e-4ed2-9c3d-e143837b62de"
